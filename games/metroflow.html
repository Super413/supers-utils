function buildRoadFromPath(path) {
    const cost = path.reduce((acc, p) => {
        const key = `${p.x},${p.y}`;
        // Prevent building over existing buildings/roads unless it's the start/end connection point
        const tile = getRoadTile(key);
        // Allow building OVER district roads or empty space
        if (tile && tile.type !== 'road' && !isDistrictRoad(key) && tile.type !== 'airport_connection' && !(path.length > 1 && (p === path[0] || p === path[path.length-1]))) {
            showNotification("Invalid Path", "Cannot build over existing highway structures.", "error");
            return Infinity; // Set cost to infinity to prevent build
        }
        return tile?.type === 'road' ? acc : acc + COSTS.ROAD_PER_SEGMENT;
    }, 0);

    if (gameState.money < cost) { 
        if (cost !== Infinity) showNotification("Insufficient Funds", `Need ${formatCurrency(cost)}.`, "error"); 
        return; 
    }
    
    path.forEach(p => { 
        const key = `${p.x},${p.y}`; 
        if (!gameState.grid[key]) { // Only build if it's not already a highway segment
             // Check if building over other structures - allow overwriting district roads
             if (!getRoadTile(key) || isDistrictRoad(key) || getRoadTile(key)?.type === 'airport_connection') {
                 // Demolish district road if present (visual cleanup, no refund needed)
                 gameState.districts.forEach(d => { if(d.grid[key]) delete d.grid[key]; });
                gameState.grid[key] = { type: 'road', lanes: 2, capacity: 2 * ROAD_CAPACITY_PER_LANE, vehicleCount: 0 }; 
             }
        }
    });
    gameState.money -= cost; 
    rebuildRoadGraph(); 
    updateUI();
}


function upgradeRoad(gridX, gridY) {
    const key = `${gridX},${gridY}`;
    const startTile = gameState.grid[key];
    if (!startTile || startTile.type !== 'road' || !gameState.techTree.advanced_roadworks.unlocked) return;

    const maxLanes = gameState.techTree.upgrade_4_lanes.unlocked ? 4 : 3;
    if (startTile.lanes >= maxLanes) return;

    let segmentsToUpgrade = new Set([key]);
    let queue = [key];
    let visited = new Set([key]);

    while (queue.length > 0) {
        const currentKey = queue.shift();
        const neighbors = getAllNeighbors(...currentKey.split(',').map(Number)); // Check diagonal too for continuity
        let highwayNeighbors = 0;
        let potentialNext = [];
        for (const nKey of neighbors) {
            if (gameState.grid[nKey]) {
                highwayNeighbors++;
                if (!visited.has(nKey)) {
                    potentialNext.push(nKey);
                }
            }
        }
         // Stop at intersections (more than 2 neighbors) OR when branching off significantly
        const currentCoords = currentKey.split(',').map(Number);
        const [currX, currY] = currentCoords;
        const isIntersection = getAllNeighbors(currX, currY).filter(nk => gameState.grid[nk]).length > 2;

        if (!isIntersection) { 
            for (const nKey of potentialNext) {
                 // Basic check to prevent upgrading short spurs branching off the main line
                 const nextCoords = nKey.split(',').map(Number);
                 const nextNeighbors = getAllNeighbors(nextCoords[0], nextCoords[1]).filter(nnk => gameState.grid[nnk]).length;
                 if (nextNeighbors >= 2) { // Only continue if the next piece also looks like part of a line/curve
                    visited.add(nKey);
                    segmentsToUpgrade.add(nKey);
                    queue.push(nKey);
                 }
            }
        }
    }


    let totalCost = 0;
    segmentsToUpgrade.forEach(segKey => {
        const tile = gameState.grid[segKey];
        if (tile && tile.lanes < maxLanes) {
            totalCost += COSTS.UPGRADE_PER_SEGMENT * tile.lanes;
        }
    });

    if (gameState.money < totalCost) {
        showNotification("Insufficient Funds", `Need ${formatCurrency(totalCost)} to upgrade stretch.`, "error");
        return;
    }

    gameState.money -= totalCost;
    segmentsToUpgrade.forEach(segKey => {
        const tile = gameState.grid[segKey];
        if (tile && tile.lanes < maxLanes) {
            tile.lanes++;
            tile.capacity = tile.lanes * ROAD_CAPACITY_PER_LANE;
        }
    });

    updateUI();
    showNotification('Highway Upgraded', `${segmentsToUpgrade.size} segments upgraded.`, 'info');
}

function buildServiceBuilding(gridX, gridY, type) {
    const key = `${gridX},${gridY}`;
    const costMap = {'rest_stop': COSTS.REST_STOP, 'maintenance_depot': COSTS.MAINTENANCE_DEPOT, 'bus_depot': COSTS.BUS_DEPOT, 'research_center': COSTS.RESEARCH_CENTER, 'park': COSTS.PARK, 'warehouse': COSTS.WAREHOUSE};
    const buildingCollectionMap = {'rest_stop': gameState.serviceBuildings, 'maintenance_depot': gameState.maintenanceDepots, 'bus_depot': gameState.busDepots, 'research_center': gameState.researchCenters, 'park': gameState.parks, 'warehouse': gameState.warehouses};
    
    const cost = costMap[type];
    const buildingCollection = buildingCollectionMap[type];

    if (getRoadTile(key)) { showNotification("Cannot Build", "Location is occupied.", "error"); return; }
    
    if (type === 'park') {
        const district = gameState.districts.find(d => gridX >= d.x && gridX < d.x + d.width && gridY >= d.y && gridY < d.y + d.height);
        if (!district || district.facility || district.grid[key]) { // Cannot build parks in facility districts or on roads
            showNotification("Invalid Location", "Parks must be built on empty land inside a non-specialized district.", "error");
            return;
        }
         if (gameState.money < cost) { showNotification("Insufficient Funds", `Need ${formatCurrency(cost)}.`, "error"); return; }
        gameState.money -= cost; buildingCollection[key] = {type: type, districtId: district.id};
        district.happiness += 0.1; // 10% bonus per park
    } else { // Other buildings adjacent to highways
        const isAdjacentToHighway = getNeighbors(gridX, gridY).some(nKey => gameState.grid[nKey]);
         if (!isAdjacentToHighway) { 
             // Allow warehouses next to industrial districts too
              if (type === 'warehouse') {
                  const isAdjacentToIndustrialRoad = getNeighbors(gridX, gridY).some(nKey => {
                      const road = getDistrictRoad(nKey);
                      return road && gameState.districts.find(d => d.grid[nKey])?.type === 'industrial';
                  });
                   if (!isAdjacentToIndustrialRoad) {
                      showNotification("Cannot Build", "Warehouses must be built next to a highway or an industrial district road.", "error"); return;
                   }
              } else {
                   showNotification("Cannot Build", "Must be built next to a highway.", "error"); return;
              }
         }
        if (gameState.money < cost) { showNotification("Insufficient Funds", `Need ${formatCurrency(cost)}.`, "error"); return; }
        // Initialize lifetimeEarnings specifically for buildings that use it
        const buildingData = { type: type, lifetimeEarnings: 0 }; // Initialize all with 0
        buildingCollection[key] = buildingData; 
    }
    rebuildRoadGraph(); updateUI();
}


function buildTollBooth(gridX, gridY) {
    const key = `${gridX},${gridY}`;
    if (!gameState.grid[key]) { showNotification("Invalid Location", "Must be built on an existing highway.", "error"); return; }
    if (gameState.tollBooths[key]) return;
    if (gameState.money < COSTS.TOLL_BOOTH) { showNotification("Insufficient Funds", `Need ${formatCurrency(COSTS.TOLL_BOOTH)}.`, "error"); return; }
    gameState.money -= COSTS.TOLL_BOOTH; gameState.tollBooths[key] = { type: 'toll', lifetimeEarnings: 0 };
    updateUI(); showNotification("Toll Booth Built", "Earn money from passing cars.", "success");
}

function demolish(gridX, gridY) {
    const key = `${gridX},${gridY}`;
    if (gameState.tollBooths[key]) { delete gameState.tollBooths[key]; gameState.money += COSTS.TOLL_BOOTH / 2; } 
    else if (gameState.grid[key]) { if(gameState.grid[key].vehicleCount > 0) { showNotification("Cannot Demolish", "Road is in use.", "error"); return; } delete gameState.grid[key]; gameState.money += COSTS.DEMOLISH_ROAD_REFUND; }
    else if (gameState.serviceBuildings[key]) { delete gameState.serviceBuildings[key]; gameState.money += COSTS.REST_STOP / 2; }
    else if (gameState.maintenanceDepots[key]) { delete gameState.maintenanceDepots[key]; gameState.money += COSTS.MAINTENANCE_DEPOT / 2; }
    else if (gameState.busDepots[key]) { delete gameState.busDepots[key]; gameState.money += COSTS.BUS_DEPOT / 2; }
    else if (gameState.researchCenters[key]) { delete gameState.researchCenters[key]; gameState.money += COSTS.RESEARCH_CENTER / 2; }
    else if (gameState.warehouses[key]) { delete gameState.warehouses[key]; gameState.money += COSTS.WAREHOUSE / 2; }
    else if (gameState.parks[key]) {
        const park = gameState.parks[key];
        const district = gameState.districts.find(d => d.id === park.districtId);
        if (district) district.happiness -= 0.05;
        delete gameState.parks[key]; gameState.money += COSTS.PARK / 2;
    }
    rebuildRoadGraph(); updateUI();
}

// --- UTILITY & HELPER FUNCTIONS ---
function findPath(startKey, endKey, nodeSet) {
    // Ensure start/end keys are valid pathable nodes before proceeding
    if (!getRoadTile(startKey) || !getRoadTile(endKey)) {
        console.warn(`Pathfinding failed: Invalid start (${startKey}) or end (${endKey}) node.`);
        return null;
    }
    // Always use BFS now
    return findPath_BFS(startKey, endKey, nodeSet);
}

function findPath_BFS(startKey, endKey, nodeSet) { 
    if (!getRoadTile(startKey) || !getRoadTile(endKey)) {
        console.warn(`BFS Pathfinding failed: Invalid start (${startKey}) or end (${endKey}) node.`);
        return null;
    }

    let queue = [{ path: [startKey], cost: 0 }]; // Store cost (length) with path
    let visited = new Map(); // Store minimum cost to reach a node
    visited.set(startKey, 0);

    let shortestPaths = [];
    let slightlyLongerPaths = [];
    let minLength = Infinity;
    const maxLengthThreshold = LONGER_PATH_THRESHOLD; // Max length difference allowed
    
    let iterations = 0; const MAX_ITERATIONS = 15000;

    while (queue.length > 0) {
         iterations++;
        if (iterations > MAX_ITERATIONS) {
            console.warn("BFS exceeded max iterations, pathfinding aborted.");
             // Return best path found so far if any
             return shortestPaths.length > 0 ? shortestPaths[0] : (slightlyLongerPaths.length > 0 ? slightlyLongerPaths[0] : null);
        }
        
        let current = queue.shift(); 
        let node = current.path[current.path.length - 1];

        // Pruning: If current path is already much longer than the best found, stop.
        if (current.cost > minLength + maxLengthThreshold) continue; 

        if (node === endKey) {
            if (current.cost < minLength) {
                // New shortest path found
                minLength = current.cost;
                // Move existing shortest to slightly longer, start new shortest list
                slightlyLongerPaths.push(...shortestPaths.filter(p => p.length <= minLength + maxLengthThreshold)); // Keep only those within threshold
                shortestPaths = [current.path];
            } else if (current.cost === minLength) {
                // Another shortest path
                shortestPaths.push(current.path);
            } else if (current.cost <= minLength + maxLengthThreshold) {
                 // A slightly longer path
                 slightlyLongerPaths.push(current.path);
            }
            continue; // Continue searching within threshold
        }

        const neighbors = nodeSet[node]?.neighbors || [];
        for (const neighbor of neighbors) { 
            if (gameState.accidents[neighbor] || !getRoadTile(neighbor)) continue; // Skip accidents and invalid tiles

            const newCost = current.cost + 1; // Simple BFS cost = length

            // Only explore if it's potentially optimal or within the longer threshold
            if ((!visited.has(neighbor) || newCost < visited.get(neighbor)) && newCost <= minLength + maxLengthThreshold) {
                visited.set(neighbor, newCost); // Update visited cost
                let newPath = [...current.path, neighbor];
                queue.push({ path: newPath, cost: newCost }); 
            } 
        }
    }

    if (shortestPaths.length === 0 && slightlyLongerPaths.length === 0) {
        // console.warn(`BFS failed to find path from ${startKey} to ${endKey}`); // Reduce spam
        return null;
    }

    // --- Path Selection Logic ---
    if (shortestPaths.length > 0 && Math.random() > LONGER_PATH_CHANCE) {
        // ~75% chance to pick a shortest path
        return shortestPaths[Math.floor(Math.random() * shortestPaths.length)];
    } else if (slightlyLongerPaths.length > 0) {
         // ~25% chance to pick a slightly longer path (if available)
         return slightlyLongerPaths[Math.floor(Math.random() * slightlyLongerPaths.length)];
    } else {
         // Fallback if no longer paths found but shortest exist
         return shortestPaths[Math.floor(Math.random() * shortestPaths.length)];
    }
}

function rebuildRoadGraph() {
    gameState.roadNodes = {};
    const allValidKeys = new Set([
        ...Object.keys(gameState.grid),
        ...Object.keys(gameState.serviceBuildings),
        ...Object.keys(gameState.maintenanceDepots),
        ...Object.keys(gameState.busDepots),
        ...Object.keys(gameState.researchCenters),
        ...Object.keys(gameState.warehouses),
        ...Object.keys(gameState.tollBooths),
    ]);
     gameState.districts.forEach(d => {
         Object.keys(d.grid).forEach(key => allValidKeys.add(key)); 
     });

    allValidKeys.forEach(key => {
         const tile = getRoadTile(key); 
         if (!tile) return; 

         const [x, y] = key.split(',').map(Number);
         getAllNeighbors(x,y).forEach(nKey => { 
             if (allValidKeys.has(nKey) && getRoadTile(nKey)) { 
                 addNeighbor(key, nKey); 
             }
         });
    });

    gameState.districts.forEach(d => { 
        d.connectionCandidates.forEach(key => { 
            const road = getRoadTile(key); 
            if(road) {
                 road.connected = !!gameState.roadNodes[key]?.neighbors.some(n => gameState.grid[n]);
            }
        }); 
    });
    if(gameState.activeContract) checkContractCompletion();
}



function addNeighbor(nodeKey, neighborKey) {
    if (!gameState.roadNodes[nodeKey]) gameState.roadNodes[nodeKey] = { neighbors: [] };
    if (!gameState.roadNodes[nodeKey].neighbors.includes(neighborKey)) gameState.roadNodes[nodeKey].neighbors.push(neighborKey);
}
// getRoadTile: Returns the tile object if it's a road OR a pathable building (not park)
function getRoadTile(key) {
    if (!key) return null;
    for (const d of gameState.districts) { if (d.grid[key]) return d.grid[key]; } // Includes airport connections now
    // Buildings are pathable nodes, but don't have vehicleCount etc like roads
    // Parks are NOT pathable
    return gameState.grid[key] || gameState.serviceBuildings[key] || gameState.tollBooths[key] || gameState.maintenanceDepots[key] || gameState.busDepots[key] || gameState.researchCenters[key] || gameState.warehouses[key];
}

// getDistrictRoad: Specifically returns a road tile that belongs to a district's internal grid (Excludes Airport)
function getDistrictRoad(key) {
    if(!key) return null;
    for (const d of gameState.districts) { 
        if (d.grid[key] && d.facility !== 'airport') return d.grid[key]; // Exclude airport districts explicitly
    }
    return null;
}
function isDistrictRoad(key) {
    if(!key) return false;
    for (const d of gameState.districts) { 
        if (d.grid[key] && d.facility !== 'airport') return true; // Exclude airport districts explicitly
    }
    return false;
}


function getNeighbors(x, y) { return [`${x},${y-1}`, `${x},${y+1}`, `${x-1},${y}`, `${x+1},${y}`]; }
function getAllNeighbors(x, y) { 
    return [
        `${x},${y-1}`, `${x},${y+1}`, `${x-1},${y}`, `${x+1},${y}`, // Cardinal
        `${x-1},${y-1}`, `${x+1},${y-1}`, `${x-1},${y+1}`, `${x+1},${y+1}` // Diagonal
    ]; 
}
function getLinePoints(x0, y0, x1, y1) {
    let points = [], dx = Math.abs(x1 - x0), sx = x0 < x1 ? 1 : -1, dy = -Math.abs(y1 - y0), sy = y0 < y1 ? 1 : -1, err = dx + dy, e2;
    for (;;) { points.push({ x: x0, y: y0 }); if (x0 === x1 && y0 === y1) break; e2 = 2 * err; if (e2 >= dy) { err += dy; x0 += sx; } if (e2 <= dx) { err += dx; y0 += sy; } }
    return points;
}
function screenToWorld(sx, sy) { return { x: (sx - canvas.width / 2) / camera.zoom + camera.x, y: (sy - canvas.height / 2) / camera.zoom + camera.y }; }
function worldToScreen(wx, wy) { return { x: (wx - camera.x) * camera.zoom + canvas.width / 2, y: (wy - camera.y) * camera.zoom + canvas.height / 2 }; }
function getVisibleGridBounds() {
    const sX = Math.floor(camera.x/TILE_SIZE-canvas.width/(2*TILE_SIZE*camera.zoom))*TILE_SIZE, eX = Math.ceil(camera.x/TILE_SIZE+canvas.width/(2*TILE_SIZE*camera.zoom))*TILE_SIZE;
    const sY = Math.floor(camera.y/TILE_SIZE-canvas.height/(2*TILE_SIZE*camera.zoom))*TILE_SIZE, eY = Math.ceil(camera.y/TILE_SIZE+canvas.height/(2*TILE_SIZE*camera.zoom))*TILE_SIZE;
    return { startX: sX, endX: eX, startY: sY, endY: eY };
}

// --- EVENT HANDLERS ---
function onMouseDown(e) { 
    mouse.down = true; 
    mouse.startDrag.x = e.clientX; 
    mouse.startDrag.y = e.clientY; 
    mouse.dragging = false; 
    if (gameState.activeTool === 'road') {
        mouse.buildPath = [{x: mouse.gridX, y: mouse.gridY}];
    }
}
function onMouseUp(e) {
    mouse.down = false; 
    const wasDragging = mouse.dragging; 
    mouse.dragging = false;

    if (gameState.activeTool === 'road' && mouse.buildPath.length > 0) {
        const finalPath = new Set();
        // Add the first point
        if (mouse.buildPath.length > 0) {
             finalPath.add(`${mouse.buildPath[0].x},${mouse.buildPath[0].y}`);
        }
       
        for (let i = 0; i < mouse.buildPath.length - 1; i++) {
            const p1 = mouse.buildPath[i];
            const p2 = mouse.buildPath[i+1];
            const segment = getLinePoints(p1.x, p1.y, p2.x, p2.y);
            segment.forEach(p => finalPath.add(`${p.x},${p.y}`));
        }
         // Add the final mouse position point if dragging occurred
         if (wasDragging) {
              const lastPoint = mouse.buildPath[mouse.buildPath.length - 1];
              const finalSegment = getLinePoints(lastPoint.x, lastPoint.y, mouse.gridX, mouse.gridY);
              finalSegment.forEach(p => finalPath.add(`${p.x},${p.y}`));
         } else if (mouse.buildPath.length === 1) { // Handle single click build
             finalPath.add(`${mouse.gridX},${mouse.gridY}`);
         }


        buildRoadFromPath(Array.from(finalPath).map(k => {
            const [x,y] = k.split(',');
            return {x: parseInt(x), y: parseInt(y)};
        }));
    } else if (!wasDragging) {
        const { gridX, gridY } = mouse;
        switch(gameState.activeTool) {
            case 'upgrade': upgradeRoad(gridX, gridY); break; 
            case 'demolish': demolish(gridX, gridY); break;
            case 'select': selectObject(gridX, gridY); break; 
            case 'service': buildServiceBuilding(gridX, gridY, 'rest_stop'); break;
            case 'toll': buildTollBooth(gridX, gridY); break; 
            case 'maintenance': buildServiceBuilding(gridX, gridY, 'maintenance_depot'); break;
            case 'bus_depot': buildServiceBuilding(gridX, gridY, 'bus_depot'); break;
            case 'research_center': buildServiceBuilding(gridX, gridY, 'research_center'); break;
            case 'park': buildServiceBuilding(gridX, gridY, 'park'); break;
            case 'warehouse': buildServiceBuilding(gridX, gridY, 'warehouse'); break;
        }
    }
    mouse.buildPath = [];
}
function onMouseMove(e) {
    const worldCoords = screenToWorld(e.clientX, e.clientY);
    mouse.x = worldCoords.x; 
    mouse.y = worldCoords.y; 
    const newGridX = Math.floor(mouse.x / TILE_SIZE);
    const newGridY = Math.floor(mouse.y / TILE_SIZE);

    if (mouse.down) {
        if (!mouse.dragging && (Math.abs(e.clientX - mouse.startDrag.x) > 5 || Math.abs(e.clientY - mouse.startDrag.y) > 5)) {
            mouse.dragging = true;
        }
        if (gameState.activeTool === 'road' && mouse.dragging) {
             const lastPoint = mouse.buildPath[mouse.buildPath.length - 1];
             // Add intermediate points if mouse moved significantly between frames
             if (Math.abs(newGridX - lastPoint.x) > 1 || Math.abs(newGridY - lastPoint.y) > 1) {
                  const newPoints = getLinePoints(lastPoint.x, lastPoint.y, newGridX, newGridY);
                 newPoints.slice(1).forEach(p => mouse.buildPath.push(p));
             } else if (newGridX !== lastPoint.x || newGridY !== lastPoint.y) {
                 mouse.buildPath.push({x: newGridX, y: newGridY}); // Add single next step
             }
        } else if (mouse.dragging) {
            camera.x -= (e.clientX - mouse.startDrag.x) / camera.zoom; 
            camera.y -= (e.clientY - mouse.startDrag.y) / camera.zoom; 
            mouse.startDrag.x = e.clientX; 
            mouse.startDrag.y = e.clientY; 
        }
    }
    mouse.gridX = newGridX;
    mouse.gridY = newGridY;
}
function onWheel(e) {
    e.preventDefault(); const zoomIntensity = 0.1, wheel = e.deltaY < 0 ? 1 : -1, zoom = Math.exp(wheel * zoomIntensity);
    const oldZoom = camera.zoom; camera.zoom = Math.max(0.2, Math.min(3, camera.zoom * zoom));
    const worldPos = screenToWorld(e.clientX, e.clientY);
    camera.x = worldPos.x - (worldPos.x - camera.x) * (oldZoom / camera.zoom); camera.y = worldPos.y - (worldPos.y - camera.y) * (oldZoom / camera.zoom);
}
function onToolSelect(e) {
    const button = e.target.closest('.btn-tool');
    if (button && !button.disabled) { gameState.activeTool = button.dataset.tool; document.querySelectorAll('#toolbar .btn-tool').forEach(b => b.classList.remove('active')); button.classList.add('active'); infoPanelEl.classList.add('hidden'); }
}
function onKeyDown(e) {
    const keyMap = { 'q': 'select', 'w': 'road', 'e': 'upgrade', 't': 'demolish', 'b': 'service', 'y': 'toll', 'm': 'maintenance', 'u': 'bus_depot', 'i': 'research_center', 'p': 'park', 'k': 'warehouse' };
    if (keyMap[e.key]) { const btn = document.querySelector(`.btn-tool[data-tool="${keyMap[e.key]}"]`); if (btn && !btn.disabled) btn.click(); }
    if (e.key === ' ') { e.preventDefault(); togglePause(); }
}

// --- CONTRACTS & TECH TREE ---
function generateContract() {
    const unconnected = gameState.districts.filter(d => !d.facility && !d.connectionCandidates.some(c => getRoadTile(c)?.connected)); // Exclude facilities
    const connected = gameState.districts.filter(d => !d.facility && d.connectionCandidates.some(c => getRoadTile(c)?.connected));
    if (unconnected.length < 1 || connected.length < 1) return;
    const districtB = unconnected[Math.floor(Math.random() * unconnected.length)];
    gameState.activeContract = { type: 'connect', districtB_id: districtB.id, reward: 20000, timeLeft: 120, districtB_type: districtB.type };
    updateContractUI();
}
function checkContractCompletion() {
    const c = gameState.activeContract; if (!c || c.type !== 'connect') return;
    const districtB = gameState.districts.find(d => d.id === c.districtB_id);
     // Add checks for road existence
    if (districtB && districtB.connectionCandidates.some(key => getRoadTile(key)?.connected)) { 
        showNotification("Contract Complete!", `+${formatCurrency(c.reward)}`, "success");
        gameState.money += c.reward; gameState.activeContract = null; updateContractUI();
    }
}
function updateContractUI() {
    if (gameState.activeContract) {
        const c = gameState.activeContract, minutes = Math.floor(c.timeLeft / 60), seconds = Math.floor(c.timeLeft % 60).toString().padStart(2, '0');
        contractContentEl.innerHTML = `<p>Connect the new <strong>${c.districtB_type}</strong> district.</p><p><strong>Reward:</strong> ${formatCurrency(c.reward)}</p><p><strong>Time Left:</strong> ${minutes}:${seconds}</p>`;
        contractPanelEl.classList.remove('hidden');
    } else { contractPanelEl.classList.add('hidden'); }
}
function openResearchPanel() {
    if (!gameState.paused) togglePause();
    researchPointsEl.textContent = `${Math.floor(gameState.researchPoints)} RP`;
    researchModalContentEl.innerHTML = '';
    for (const techId in gameState.techTree) {
        const tech = gameState.techTree[techId];
        const card = document.createElement('div');
        const requirementsMet = tech.requires.every(req => gameState.techTree[req].unlocked);
        let status = 'locked';
        if (tech.unlocked) status = 'unlocked';
        else if (requirementsMet && gameState.researchPoints >= tech.cost) status = 'researchable';
        card.className = `tech-card p-3 rounded-lg cursor-pointer ${status}`;
        card.innerHTML = `<h4 class="font-bold">${tech.name}</h4><p class="text-xs">${tech.description}</p><p class="text-sm font-semibold mt-2">${tech.unlocked ? 'Unlocked' : `${tech.cost} RP`}</p>`;
        if (status === 'researchable') card.onclick = () => researchTech(techId);
        researchModalContentEl.appendChild(card);
    }
    showModal(researchModalOverlayEl);
}
function researchTech(techId) {
    const tech = gameState.techTree[techId];
    if (!tech.unlocked && gameState.researchPoints >= tech.cost && tech.requires.every(req => gameState.techTree[req].unlocked)) {
        gameState.researchPoints -= tech.cost;
        tech.unlocked = true;

        if (techId === 'upgrade_4_lanes') {
            for (const key in gameState.grid) {
                const road = gameState.grid[key];
                if (road.lanes < 4) {
                    road.lanes = 4;
                    road.capacity = 4 * ROAD_CAPACITY_PER_LANE;
                }
            }
             showNotification('Network Upgraded!', 'All existing highways are now 4 lanes.', 'success');
        }
        
        updateToolbarAvailability();
        openResearchPanel(); // Refresh panel
    }
}
function updateToolbarAvailability() {
    document.querySelector('[data-tool="upgrade"]').disabled = !gameState.techTree.advanced_roadworks.unlocked;
    document.querySelector('[data-tool="service"]').disabled = !gameState.techTree.service_areas.unlocked;
    document.querySelector('[data-tool="toll"]').disabled = !gameState.techTree.toll_booths.unlocked;
    document.querySelector('[data-tool="maintenance"]').disabled = !gameState.techTree.maintenance.unlocked;
    document.querySelector('[data-tool="bus_depot"]').disabled = !gameState.techTree.public_transit.unlocked;
    document.querySelector('[data-tool="research_center"]').disabled = !gameState.techTree.research_center.unlocked;
    document.querySelector('[data-tool="park"]').disabled = !gameState.techTree.civic_planning.unlocked;
    document.querySelector('[data-tool="warehouse"]').disabled = !gameState.techTree.logistics_hub.unlocked;
}

// --- UI & FEEDBACK ---
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
function updateUI() {
    moneyEl.textContent = formatCurrency(gameState.money);
    efficiencyEl.textContent = `${gameState.efficiency.toFixed(0)}%`;
    vehicleCountEl.textContent = gameState.vehicles.length;
}
function formatCurrency(amount) { return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 0 }).format(amount); }
function selectObject(gridX, gridY) {
    const key = `${gridX},${gridY}`;
    const warehouse = gameState.warehouses[key];
    const park = gameState.parks[key];
    const researchCenter = gameState.researchCenters[key];
    const busDepot = gameState.busDepots[key];
    const maintenanceDepot = gameState.maintenanceDepots[key];
    const tollBooth = gameState.tollBooths[key];
    const road = getRoadTile(key);
    const restStop = gameState.serviceBuildings[key];
    const district = gameState.districts.find(d => gridX >= d.x && gridX < d.x + d.width && gridY >= d.y && gridY < d.y + d.height);

    if (park) { infoTitleEl.textContent = "Park"; infoContentEl.innerHTML = `<p>Increases happiness in the surrounding district, boosting income.</p>`; }
    else if (researchCenter) { infoTitleEl.textContent = "Research Center"; infoContentEl.innerHTML = `<p>Generates Research Points over time.</p>`; }
    else if (busDepot) { infoTitleEl.textContent = "Bus Depot"; infoContentEl.innerHTML = `<p>Spawns buses to reduce car traffic across the network.</p>`; }
    else if (maintenanceDepot) { infoTitleEl.textContent = "Maintenance Depot"; infoContentEl.innerHTML = `<p>Improves overall network efficiency and reduces accident duration.</p>`; }
    else if (tollBooth) { infoTitleEl.textContent = "Toll Booth"; infoContentEl.innerHTML = `<p>Slows traffic but generates ${formatCurrency(INCOME.TOLL)} per vehicle.</p><p><strong>Lifetime Earnings:</strong> ${formatCurrency(tollBooth.lifetimeEarnings || 0)}</p>`; }
    else if (warehouse) { infoTitleEl.textContent = "Warehouse"; infoContentEl.innerHTML = `<p>Acts as a hub for trucks, increasing delivery income.</p>`; }
    else if (road) { 
        infoTitleEl.textContent = gameState.grid[key] ? "Highway Segment" : "District Road"; 
        let vehiclesOnSegment = gameState.vehicles.filter(v => v.currentSegmentKey === key);
        let carCount = vehiclesOnSegment.filter(v => v.type === 'car').length;
        let truckCount = vehiclesOnSegment.filter(v => v.type === 'truck').length;
        let busCount = vehiclesOnSegment.filter(v => v.type === 'bus').length;
        let touristCount = vehiclesOnSegment.filter(v => v.type === 'tourist').length;
        infoContentEl.innerHTML = `<p><strong>Lanes:</strong> ${road.lanes}</p><p><strong>Usage:</strong> ${road.vehicleCount} / ${road.capacity}</p><div class="mt-2 border-t border-gray-600 pt-2"><p><strong>Cars:</strong> ${carCount}</p><p><strong>Trucks:</strong> ${truckCount}</p><p><strong>Buses:</strong> ${busCount}</p><p><strong>Tourists:</strong> ${touristCount}</p></div>`; 
    }
    else if (restStop) { infoTitleEl.textContent = "Rest Stop"; infoContentEl.innerHTML = `<p>A place for drivers to rest, generating income.</p><p><strong>Lifetime Earnings:</strong> ${formatCurrency(restStop.lifetimeEarnings || 0)}</p>`; } // Fixed earnings display
    else if (district) { 
        infoTitleEl.textContent = `${district.type.charAt(0).toUpperCase() + district.type.slice(1)} District`; 
        let facilityText = district.facility ? ` (${district.facility.charAt(0).toUpperCase() + district.facility.slice(1)})` : '';
        let specializationText = district.specialization ? district.specialization.replace('_', ' ').replace(/\b\w/g, l => l.toUpperCase()) : 'None';
        let xpToNextLevel = XP_FOR_LEVEL_UP(district.level);
        infoContentEl.innerHTML = `<p><strong>Level:</strong> ${district.level}${facilityText}</p><p><strong>XP:</strong> ${Math.floor(district.xp)} / ${xpToNextLevel}</p><p><strong>Happiness:</strong> ${(district.happiness * 100).toFixed(0)}%</p><p><strong>Specialization:</strong> ${specializationText}</p>`; 
    } else {
        infoPanelEl.classList.add('hidden'); return;
    }
     infoPanelEl.classList.remove('hidden');
}
function showNotification(title, message, type = 'info', id = null) {
    const notificationArea = document.getElementById('notification-area');
    if (id) {
        const existing = document.getElementById(id);
        if (existing) { existing.innerHTML = `<h4 class="font-bold">${title}</h4><p class="text-sm">${message}</p>`; return existing; }
    }
    const notif = document.createElement('div');
    if(id) notif.id = id;
    notif.className = `notification p-3 rounded-lg shadow-lg text-white bg-${type === 'info' ? 'blue' : type === 'success' ? 'green' : 'red'}-500 mb-2`;
    notif.innerHTML = `<h4 class="font-bold">${title}</h4><p class="text-sm">${message}</p>`;
    notificationArea.prepend(notif);
    if(!id) { setTimeout(() => { notif.style.transition = 'opacity 0.5s ease, transform 0.5s ease'; notif.style.opacity = '0'; notif.style.transform = 'translateX(-100%)'; setTimeout(() => notif.remove(), 500); }, 4000); }
    return notif;
}
function handleBatchedNotifications() {
    if (gameState.batchedIncome > 0 && gameState.gameTime > gameState.lastIncomeNotificationTime + 3) {
        const notifId = 'income-notification';
        showNotification("Income", `+${formatCurrency(gameState.batchedIncome)} from trips`, 'success', notifId);
        gameState.batchedIncome = 0; gameState.lastIncomeNotificationTime = gameState.gameTime;
        setTimeout(() => { const el = document.getElementById(notifId); if(el) { el.style.transition = 'opacity 0.5s ease, transform 0.5s ease'; el.style.opacity = '0'; el.style.transform = 'translateX(-100%)'; setTimeout(() => el.remove(), 500); } }, 2000);
    }
}
function createFloatingText(text, wx, wy) {
    const container = document.getElementById('floating-text-container');
    const textEl = document.createElement('div');
    const screenPos = worldToScreen(wx, wy);
    textEl.className = 'floating-text'; textEl.textContent = text;
    textEl.style.left = `${screenPos.x}px`; textEl.style.top = `${screenPos.y}px`;
    container.appendChild(textEl);
    setTimeout(() => textEl.remove(), 1500);
}
function togglePause() {
    gameState.paused = !gameState.paused;
    document.getElementById('pause-button').textContent = gameState.paused ? 'Resume' : 'Pause';
    if (gameState.paused && !gameState.gameOver) showModal(modalOverlayEl, "Game Paused", "The simulation is paused. Press Resume or the spacebar to continue.");
    else if (!gameState.gameOver) hideModal(modalOverlayEl);
}
function showHelp() {
    if (!gameState.paused) togglePause();
    const helpText = `<p class="mb-2"><strong>Goal:</strong> Connect districts to create a profitable highway network.</p><p class="mb-2"><strong>Core Mechanics:</strong></p><ul class="list-disc list-inside space-y-2"><li><strong>Research:</strong> Earn Research Points (RP) to unlock new tools and buildings.</li><li><strong>Build Roads (W):</strong> Connect the bright border roads of districts.</li><li><strong>Events:</strong> Watch out for Rush Hour and Accidents!</li><li><strong>Contracts:</strong> Complete timed objectives for big cash rewards (unlockable via Research).</li></ul>`;
    showModal(modalOverlayEl, "How to Play", helpText);
}
function gameOver(reason) { gameState.gameOver = true; gameState.paused = true; showModal(modalOverlayEl, "Game Over", `${reason}<br><br>Refresh the page to try again.`); }
function showModal(modal, title, content) {
    const modalTitle = modal.querySelector('h2');
    const modalContent = modal.querySelector('div[id$="-content"]');
    if (title) modalTitle.textContent = title;
    if (content) modalContent.innerHTML = content;
    modal.classList.remove('hidden');
    setTimeout(() => modal.children[0].classList.remove('scale-95', 'opacity-0'), 10);
}
function hideModal(modal) {
    modal.children[0].classList.add('scale-95', 'opacity-0');
    setTimeout(() => modal.classList.add('hidden'), 200);
}

// --- DISTRICT SPECIALIZATION ---
function checkDistrictLevelUps() {
    for (const district of gameState.districts) {
        if (district.specialization || district.facility) continue; // Facilities prevent specialization
        const xpNeeded = XP_FOR_LEVEL_UP(district.level);
        if (district.xp >= xpNeeded) {
            district.level++;
            district.xp -= xpNeeded;
            promptSpecialization(district);
        }
    }
}
function promptSpecialization(district) {
    if (!gameState.paused) togglePause();
    const sub = document.getElementById('specialization-modal-subtitle');
    const content = document.getElementById('specialization-modal-content');
    sub.textContent = `Your ${district.type} district has reached Level ${district.level}! Choose a specialization:`;
    content.innerHTML = '';
    
    let options = [];
    switch (district.type) {
        case 'residential':
            options = [
                { id: 'high_density', name: 'High-Density Housing', desc: 'Spawns 1.5x more cars. -5% happiness.' },
                { id: 'suburban', name: 'Suburban Bliss', desc: 'Spawns 0.7x cars. +10% happiness.' }
            ];
            break;
        case 'commercial':
            options = [
                { id: 'financial', name: 'Financial District', desc: 'Trips ending here are worth 50% more.' },
                { id: 'retail', name: 'Retail Hub', desc: 'Doubles the chance of shopping trips.' }
            ];
            break;
        case 'industrial':
            options = [
                { id: 'manufacturing', name: 'Manufacturing Plant', desc: 'Spawns 1.5x more trucks. Causes unhappiness in nearby residential districts.' },
                { id: 'logistics', name: 'Logistics Center', desc: 'Trucks from here are 50% faster.' }
            ];
            break;
    }

    options.forEach(opt => {
        const card = document.createElement('div');
        card.className = 'specialization-card p-4 rounded-lg cursor-pointer';
        card.innerHTML = `<h4 class="font-bold text-lg">${opt.name}</h4><p class="text-sm">${opt.desc}</p>`;
        card.onclick = () => selectSpecialization(district, opt.id);
        content.appendChild(card);
    });

    showModal(specializationModalOverlayEl);
}

function selectSpecialization(district, specId) {
    district.specialization = specId;

    if (specId === 'suburban') district.happiness += 0.10;
    if (specId === 'high_density') district.happiness -= 0.05;

    if (specId === 'manufacturing') {
        applyFactoryUnhappiness(district); // Apply unhappiness effect
    }

    hideModal(specializationModalOverlayEl);
    if (gameState.paused) togglePause();
}


// --- START THE GAME ---
init();
</script>
