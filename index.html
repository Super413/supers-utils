<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Game Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Exo 2', Arial, sans-serif;
      background: #0a0a0f;
      color: #e8e8f0;
      min-height: 100vh;
    }

    header {
      position: relative;
      text-align: center;
      padding: 56px 24px 48px;
      background: linear-gradient(180deg, #0d0d18 0%, #0a0a0f 100%);
      border-bottom: 1px solid #2a2a3a;
      overflow: hidden;
    }
    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(0,229,255,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 40% 40% at 20% 110%, rgba(255,45,120,0.06) 0%, transparent 70%);
      pointer-events: none;
    }
    .scanlines {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.07) 3px, rgba(0,0,0,0.07) 4px);
      pointer-events: none;
      z-index: 1;
    }
    .header-inner { position: relative; z-index: 2; }

    h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(1.2rem, 4vw, 2.2rem);
      color: #00e5ff;
      text-shadow: 0 0 20px rgba(0,229,255,0.6), 0 0 40px rgba(0,229,255,0.25);
      letter-spacing: 2px;
      line-height: 1.5;
    }
    .subtitle {
      margin-top: 14px;
      font-size: 0.9rem;
      color: #6b6b80;
      letter-spacing: 1px;
      text-transform: uppercase;
      font-weight: 600;
    }

    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 48px 24px 64px;
    }
    section + section { margin-top: 56px; }

    .section-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.7rem;
      color: #6b6b80;
      text-transform: uppercase;
      letter-spacing: 3px;
      margin-bottom: 24px;
    }
    .section-label .star { color: #ff2d78; }

    .featured-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    @media (max-width: 680px) { .games-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 440px) { .games-grid { grid-template-columns: 1fr; } }

    .card {
      background: #16161f;
      border: 1px solid #2a2a3a;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      position: relative;
      display: block;
    }
    .card:hover {
      transform: translateY(-4px) scale(1.02);
      border-color: #00e5ff;
      box-shadow: 0 0 16px rgba(0,229,255,0.25);
    }

    .thumb {
      width: 100%;
      height: 130px;
      object-fit: cover;
      display: block;
      background: #12121a;
    }
    .thumb-placeholder {
      width: 100%;
      height: 130px;
      background: linear-gradient(135deg, #1a1a28, #12121e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
    }
    .featured-grid .thumb,
    .featured-grid .thumb-placeholder { height: 150px; }

    .card-body { padding: 12px 14px 14px; }
    .card-title {
      font-size: 0.88rem;
      font-weight: 700;
      color: #e8e8f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .featured-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: #ff2d78;
      color: #fff;
      font-size: 0.55rem;
      font-family: 'Press Start 2P', monospace;
      padding: 3px 6px;
      border-radius: 4px;
      z-index: 2;
    }

    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 36px;
      flex-wrap: wrap;
    }

    .page-btn {
      font-family: 'Press Start 2P', monospace;
      font-size: 0.55rem;
      background: #16161f;
      color: #6b6b80;
      border: 1px solid #2a2a3a;
      border-radius: 6px;
      padding: 9px 12px;
      cursor: pointer;
    }

    .page-btn.active {
      background: #00e5ff;
      color: #000;
      border-color: #00e5ff;
    }

    .empty {
      text-align: center;
      color: #6b6b80;
      font-size: 0.9rem;
      padding: 40px 0;
      grid-column: 1 / -1;
    }
  </style>
</head>
<body>

<header>
  <div class="scanlines"></div>
  <div class="header-inner">
    <h1>🎮 Game Hub</h1>
    <p class="subtitle">By Super</p>
  </div>
</header>

<main>

  <section id="featured-section">
    <p class="section-label"><span class="star">⭐</span> Featured</p>
    <div id="featured" class="featured-grid"></div>
  </section>

  <section id="all-section">
    <p class="section-label">All Games</p>
    <div id="games" class="games-grid"></div>
    <div id="pagination" class="pagination"></div>
  </section>

</main>

<script>
var PER_PAGE = 6;
var allGames = [];
var page = 1;

function placeholder() {
  var d = document.createElement('div');
  d.className = 'thumb-placeholder';
  d.textContent = '🎮';
  return d;
}

function makeCard(game, featured) {
  var card = document.createElement('div');
  card.className = 'card';

  if (featured) {
    var badge = document.createElement('span');
    badge.className = 'featured-badge';
    badge.textContent = '★ featured';
    card.appendChild(badge);
  }

  if (game.image) {
    var img = document.createElement('img');
    img.className = 'thumb';
    img.src = game.image;
    img.alt = game.name;
    img.onerror = function() { this.replaceWith(placeholder()); };
    card.appendChild(img);
  } else {
    card.appendChild(placeholder());
  }

  var body = document.createElement('div');
  body.className = 'card-body';

  var title = document.createElement('div');
  title.className = 'card-title';
  title.textContent = game.name;

  body.appendChild(title);
  card.appendChild(body);

  card.onclick = function() { window.location.href = game.file; };
  return card;
}

function renderPage(p) {
  page = p;
  var container = document.getElementById('games');
  container.innerHTML = '';

  var slice = allGames.slice((p - 1) * PER_PAGE, p * PER_PAGE);

  if (!slice.length) {
    container.innerHTML = '<p class="empty">No games found.</p>';
  } else {
    slice.forEach(function(g) {
      container.appendChild(makeCard(g, false));
    });
  }

  renderPager();
}

function renderPager() {
  var container = document.getElementById('pagination');
  container.innerHTML = '';
  var total = Math.ceil(allGames.length / PER_PAGE);

  for (var i = 1; i <= total; i++) {
    (function(n) {
      var b = document.createElement('button');
      b.className = 'page-btn' + (n === page ? ' active' : '');
      b.textContent = n;
      b.onclick = function() { renderPage(n); };
      container.appendChild(b);
    })(i);
  }
}

async function load() {
  try {
    var res = await fetch('games.json');
    var games = await res.json();
    allGames = games;

    var fc = document.getElementById('featured');

    // ✅ FIX: clear container
    fc.innerHTML = '';

    var featured = games.filter(function(g) {
      return g.featured === true;
    });

    if (!featured.length) {
      document.getElementById('featured-section').style.display = 'none';
    } else {
      document.getElementById('featured-section').style.display = '';
      featured.forEach(function(g) {
        fc.appendChild(makeCard(g, true));
      });
    }

    renderPage(1);

  } catch (e) {
    console.error(e);
  }
}

load();
</script>

</body>
</html>
